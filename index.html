<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIBT Brigada - Painel Operacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nibt: {
                            dark: '#0a0f1d',
                            card: '#161e31',
                            accent: '#ef4444',
                            warning: '#f59e0b',
                            success: '#10b981',
                            border: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #0a0f1d; -webkit-tap-highlight-color: transparent; }
        .custom-glass { background: rgba(22, 30, 49, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col">

    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="flex-1 flex flex-col justify-center items-center p-6">
        <div class="w-full max-w-md p-8 rounded-3xl custom-glass shadow-2xl space-y-8 relative">
            <div class="text-center">
                <div class="w-20 h-20 bg-red-600/20 border-2 border-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-fire-shield text-red-500 text-4xl"></i>
                </div>
                <h1 class="text-2xl font-black tracking-widest text-white uppercase">NIBT BRIGADA</h1>
                <p class="text-slate-400 text-xs mt-1 uppercase tracking-wider">Controle de Inventário & Vistorias</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 mb-2">E-mail</label>
                    <input type="email" id="loginEmail" required class="w-full bg-nibt-dark border border-nibt-border rounded-xl py-3.5 px-4 text-white focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 mb-2">Senha</label>
                    <input type="password" id="loginPassword" required class="w-full bg-nibt-dark border border-nibt-border rounded-xl py-3.5 px-4 text-white focus:outline-none focus:border-red-500">
                </div>
                <div id="loginError" class="bg-red-500/20 border border-red-500/40 text-red-200 text-xs p-3 rounded-lg hidden"></div>
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all">INICIAR SESSÃO</button>
            </form>
        </div>
    </div>

    <!-- TELA PRINCIPAL DO APLICATIVO -->
    <div id="appScreen" class="flex-1 flex flex-col hidden">
        <!-- Header Principal -->
        <header class="bg-nibt-card border-b border-nibt-border px-4 py-3.5 flex justify-between items-center sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-600/15 border border-red-500/30 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-fire text-red-500 text-lg"></i>
                </div>
                <div>
                    <h2 class="text-sm font-black text-white">NIBT BRIGADA</h2>
                    <p id="userEmailDisplay" class="text-[10px] text-slate-400 font-medium"></p>
                </div>
            </div>
            <button id="logoutBtn" class="text-slate-400 hover:text-red-400 p-2"><i class="fa-solid fa-power-off text-lg"></i></button>
        </header>

        <!-- Conteúdo Principal Dinâmico -->
        <main class="flex-1 p-4 pb-24 max-w-md mx-auto w-full">

            <!-- SEÇÃO 1: PAINEL DE INVENTÁRIO (Cards dos Extintores) -->
            <div id="secInventario" class="space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-base font-black tracking-wide uppercase border-l-4 border-red-500 pl-3">Inventário Geral</h3>
                    <button id="openAddExtModalBtn" class="bg-red-600/20 text-red-400 border border-red-500/30 text-xs font-bold py-1.5 px-3 rounded-lg hover:bg-red-600 hover:text-white transition-all">
                        <i class="fa-solid fa-plus mr-1"></i> Novo Extintor
                    </button>
                </div>

                <!-- BARRA DE PESQUISA POR NÚMERO/CÓDIGO (Adicionado Aqui) -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500 text-xs">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchExtInput" placeholder="Buscar extintor pelo número (Ex: EXT-01)..."
                        class="w-full bg-nibt-card border border-nibt-border rounded-xl py-3 pl-10 pr-4 text-white text-xs placeholder-slate-500 focus:outline-none focus:border-red-500/55 transition-all">
                </div>

                <!-- Lista de Cards de Extintores Cadastrados -->
                <div id="gridExtintores" class="grid grid-cols-1 gap-3">
                    <!-- Cards serão injetados dinamicamente via JS -->
                </div>
            </div>

            <!-- SEÇÃO 2: DETALHES / FICHA TÉCNICA E HISTÓRICO -->
            <div id="secDetalhes" class="space-y-4 hidden">
                <button id="backToInventarioBtn" class="text-xs text-slate-400 hover:text-white font-bold py-1 flex items-center gap-1">
                    <i class="fa-solid fa-chevron-left"></i> Voltar ao Inventário
                </button>

                <div id="detalhesExtintorCard">
                    <!-- Informações do Extintor Selecionado e Última Análise serão injetadas aqui -->
                </div>
            </div>

            <!-- SEÇÃO 3: FORMULÁRIO DE NOVA VISTORIA (Checklist NBR) -->
            <div id="secVistoria" class="space-y-4 hidden">
                <button id="cancelVistoriaBtn" class="text-xs text-slate-400 hover:text-white font-bold py-1 flex items-center gap-1">
                    <i class="fa-solid fa-chevron-left"></i> Cancelar Vistoria
                </button>

                <div class="bg-nibt-card border border-nibt-border rounded-2xl p-5 shadow-md">
                    <h4 class="text-sm font-black text-white uppercase mb-4" id="vistoriaTitle">Nova Vistoria</h4>

                    <div id="reader-container" class="hidden mb-4 overflow-hidden rounded-xl border border-nibt-border bg-black relative">
                        <div id="reader" class="w-full"></div>
                    </div>

                    <form id="inspectionForm" class="space-y-4">
                        <div class="space-y-3" id="checklistContainer"></div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1">Próxima Recarga</label>
                            <input type="date" id="vencimentoRecarga" required class="w-full bg-nibt-dark border border-nibt-border rounded-xl p-3 text-white text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1">Teste Hidrostático</label>
                            <input type="date" id="vencimentoHidrostatico" required class="w-full bg-nibt-dark border border-nibt-border rounded-xl p-3 text-white text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1">Observações</label>
                            <textarea id="observacoes" rows="2" class="w-full bg-nibt-dark border border-nibt-border rounded-xl p-3 text-white text-xs" placeholder="Anote avarias..."></textarea>
                        </div>
                        <button type="submit" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg">SALVAR VISTORIA</button>
                    </form>
                </div>
            </div>

        </main>

        <!-- Barra de Navegação Inferior Móvel -->
        <nav class="bg-nibt-card border-t border-nibt-border py-2 px-6 fixed bottom-0 left-0 right-0 z-40 flex justify-around items-center max-w-md mx-auto rounded-t-3xl shadow-2xl">
            <button id="navInventarioTab" class="flex flex-col items-center gap-1 py-1 text-red-500">
                <i class="fa-solid fa-boxes-stacked text-xl"></i>
                <span class="text-[10px] font-black uppercase">Inventário</span>
            </button>
            <button id="navScanTab" class="flex flex-col items-center gap-1 py-1 text-slate-400">
                <i class="fa-solid fa-qrcode text-xl"></i>
                <span class="text-[10px] font-black uppercase">Escanear</span>
            </button>
        </nav>
    </div>

    <!-- MODAL POPUP GLOBAL -->
    <div id="customModal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-xs p-6 rounded-2xl bg-nibt-card border border-nibt-border text-center space-y-4 shadow-2xl">
            <div id="modalIcon" class="w-12 h-12 rounded-full flex items-center justify-center mx-auto text-2xl"></div>
            <h4 id="modalTitle" class="text-lg font-black text-white"></h4>
            <p id="modalMessage" class="text-xs text-slate-400"></p>
            <button id="modalCloseBtn" class="w-full bg-nibt-border text-white font-bold py-2.5 rounded-xl text-xs">Fechar</button>
        </div>
    </div>

    <!-- MODAL DE CADASTRO DE NOVO EXTINTOR -->
    <div id="addExtintorModal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm p-6 rounded-2xl bg-nibt-card border border-nibt-border space-y-4 shadow-2xl">
            <h4 class="text-base font-black text-white uppercase border-l-4 border-red-500 pl-2">Cadastrar Extintor</h4>
            <form id="addExtintorForm" class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Código (Ex: EXT-15)</label>
                    <input type="text" id="newExtId" required class="w-full bg-nibt-dark border border-nibt-border rounded-xl p-2.5 text-white uppercase">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Localização (Ex: Corredor da Nave)</label>
                    <input type="text" id="newExtLocal" required class="w-full bg-nibt-dark border border-nibt-border rounded-xl p-2.5 text-white">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Tipo e Capacidade (Ex: PQS - 4KG)</label>
                    <input type="text" id="newExtTipo" required class="w-full bg-nibt-dark border border-nibt-border rounded-xl p-2.5 text-white" placeholder="Água 10L, CO2 6KG, PQS 4KG...">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" id="closeAddExtModalBtn" class="flex-1 bg-nibt-dark border border-nibt-border text-slate-400 py-2.5 rounded-xl font-bold text-xs">Cancelar</button>
                    <button type="submit" class="flex-1 bg-red-600 text-white py-2.5 rounded-xl font-bold text-xs shadow-lg shadow-red-600/20">Salvar no Banco</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ARQUIVO MESTRE DE INICIALIZAÇÃO DA LOGICA MODULAR -->
    <script type="module">
        import { initAuth } from './js/auth.js';

        // Inicializa o sistema de autenticação e injeta as regras globais de modais
        window.showModal = function(title, msg, type = 'success') {
            const modal = document.getElementById('customModal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerText = msg;
            const icon = document.getElementById('modalIcon');
            icon.className = 'w-12 h-12 rounded-full flex items-center justify-center mx-auto text-2xl ';
            if(type === 'success') icon.className += 'bg-emerald-500/20 text-emerald-400-check';
            if(type === 'error') icon.className += 'bg-red-500/20 text-red-400';
            modal.classList.remove('hidden');
        };
        document.getElementById('modalCloseBtn').onclick = () => document.getElementById('customModal').classList.add('hidden');

        // Dispara a autenticação modular
        initAuth();
    </script>
</body>
</html>
